<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14171C" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="KPIeve — Onboarding team KPI dashboard." />
    <title>KPIeve · Onboarding KPIs</title>

    <!-- Set theme before paint to avoid flash. Defaults to LIGHT unless the
         user has explicitly chosen dark before. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('kpieve-theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
